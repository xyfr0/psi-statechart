<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="flex flex-col items-center justify-center h-screen">
        <div>
            <h1 class="text-3xl font-bold underline">
                Data Entry Form 
            </h1>
            <h2>
                Insert your data below
            </h2>
        </div>
        <div class="m-10 gap-4" id="forms">
          <div class="p-1">
            <p>Forename</p>
            <input type="text" class="border" id="forename">
          </div>
          <div class="p-1">
            <p>Surname</p>
            <input type="text" class="border" id="surname">
          </div>
          <div class="p-1">
            <p>Age</p>
            <input type="number" class="border" id="age">
          </div>
        </div>
        <div class="flex flex-col items-center" id="button">
          <button type="button" class="border border-grey-500 bg-sky-200 hover:bg-sky-400 cursor-pointer w-46" onclick="submit()" id="submit-button">Submit</button>
          <p class="text-red-700" style="display: none;" id="alert-form">Formulir masih kosong, mohon diisi</p>
        </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
