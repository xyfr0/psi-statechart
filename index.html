<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="flex items-center justify-center h-screen">
        <div>
            <h1 class="text-3xl font-bold underline">
                Data Entry Form 
            </h1>
            <h2>
                Insert your data below
            </h2>
        </div>
        <div>
          <input type="text" placeholder="Enter your forename" class="border border-gray-300 rounded px-4 py-2 mb-4" />
          <input type="text" placeholder="Enter your surname" class="border border-gray-300 rounded px-4 py-2 mb-4" /> 
          <input type="number" placeholder="Enter your age" class="border border-gray-300 rounded px-4 py-2 mb-4" />
          <button class="bg-blue-500 text-white px-4 py-2 rounded">Submit</button>
        </div>
    </div>
  </body>
</html>
